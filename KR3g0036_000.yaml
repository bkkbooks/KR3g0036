body:
  text: 提要珞琭子賦注二巻術數類五命書相書之屬臣等謹案錢曾讀書敏求記稱珞琭子三命消息賦二卷王廷光李仝釋曇瑩徐子平四家注解今考永樂大典所載凡有二本一本則徐子平註一即此本獨題曇瑩之名而廷光與仝之說悉在焉或錢氏之本乃後人輯四家之説合為一書故所題撰人之名互異抑此本為曇瑩撮王李之注附以巳説故其文兼渉二家歟廷光之書進於宣和癸夘曇瑩之書成於建炎丁未在廷光後五年知非與廷光等仝注而卷首董㢲楚頤二序亦惟稱曇瑩一人則當以永樂大典獨題其名為是也其説往往以命理附合易理似不及徐子平註為明白切實然如所列王廷光推演命限一條頗為精確曇瑩自論孤虚一條亦有可採擇與徐氏之書並行亦可謂驂之靳矣上卷之中三家之注並載下巻之中則曇瑩之注多而廷光與仝之注少又曇瑩自序以李仝鄭潾並稱而巻中無潾一語疑傳寫脱佚或永樂大典有所刪節亦未可定也廷光與仝爵里事迹均無可考李仝之名讀書敏求記作同晁公武讀書志作全亦莫詳孰是曇瑩號蘿月嘉興人以談易名一時洪邁容齋隨筆載之稱曰易僧其以易理言命盖由於是云乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀珞琭子賦註原序夫質判元黄氣分清濁三才既辨萬象巳陳珞琭子書斯文舉矣是知榮枯否㤗得喪存亡若鑑對形妍醜自見古所謂不知命無以為君子余獲其文積有年矣而禪餘之暇未甞忘之於是立節苦心求仁飬志不言之教可以為師鄭潾李仝得志於前單見淺聞續註於後將使來者用廣其傳凡我同流無視輕耳建炎改元丁未太嵗夷則望日嘉禾釋曇瑩序不知命無以為君子誠謂消息盈虚之理殆難逃乎數珞琭子實天下命論之母也根其萌兆得其榮枯深造其㫖者𤣥斷神遇象外之㣲不可得而言𫝊故於情性善惡成敗賤貴視之指掌萬無一失焉其或推䆒不盡其妙休咎罕中乎的豈智慮之不至耶抑亦臨文而自昩耳嘉禾瑩師深得其道不愧古人慨然剖判而註解之欲後之讀者㳂流而得其本尋諦而獲其真携以過予索為序引予笑與之曰師徒知有涯既生之後者也於未兆時而能卜哉瑩瞠若有間罄折而諾建炎戊申重十日董巽公權序陶𢎞景自稱珞琭子盖取夫不欲如玉如石之説方其𨼆居時號為山中宰相故著述行者尤多命書作賦其言愈見深妙至於凝神通道豈淺聞之士所能及哉題篇直曰珞琭子則謂陶𢎞景復何疑焉瑩師禪老能研究成文用心亦已勤矣警化誠不淺爾世莫知珞琭子為誰因以所聞而叙之朝議大夫前通判郴州軍州事賜紫金魚袋楚頥飬正撰
