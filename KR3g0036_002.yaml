body:
  text: 珞琭子賦注卷下宋釋曇瑩撰無合有合後學難知得一分三前賢不載王廷光曰道立於兩成於三變於五而天地之數具其十也耦之而已蓋五行皆有耦推而散之無所不通然耦之中又有耦焉故萬物之變道至於無窮也易立象以盡意為言之不可盡意也何獨易也所謂無合有合者亦然且如甲巳之合甲不見巳而見午亦然也蓋午中有巳也此乃無合有合者也得一分三者甲祿得巳為一合也得午為二合也得亥為三合也亥之與寅支合也此乃得一祿而為三合者也舊注以庚祿在申以申子辰上得庚謂之得一分三此乃三合㑹祿衆所共知又何謂之前賢不載後學難知也此篇與前文見不見之形抽不抽之緒理相貫穿李虛中論支干合全格者年月日時胎五位何以能合干支全也蓋言其子則丑在焉言其寅則亥在焉言其甲則己在焉言其乙則庚在焉祿干五位如𢃄甲乙丙丁戊全自然合起己庚辛壬癸十字之全矣十二支中如𢃄寅卯辰巳午全自然合起未申酉戌亥十字之全矣或於子丑位有嵗運祿馬加之則十干十二支皆合全也言此一法開闢以來如珞琭子者深明此意故曰後學難知李同曰得一者謂庚祿在申申子辰三位皆為庚祿之位若庚人七月或於日辰時並為建祿或是庚子庚辰尤佳故云得一分三前賢不載也曇瑩曰嘗試論之其寅與亥合而不見亥但得壬者是也緣亥上有壬壬祿在亥故也又如甲與巳合而不見巳但得午是也緣午上有己巳祿在午故也次如寅午戌合而不見寅但得甲者是也緣寅中有甲甲祿在寅故也大抵合中𢃄吉其福可言合處相傷却成無補舉一隅須以三隅反所謂得一分三前賢不載年雖逄於冠𢃄尚有餘災運初至於衰鄉猶披鮮福王廷光曰天道之運周而復始或始小而終大或始盛而終衰故有消息盈虛之異者人之運氣年庚亦由此也每年運或初離沐浴暴敗之地而順行才至冠𢃄之上未可便以為福蓋尚有敗鄉之餘災也或自旺鄉而行初至衰鄉亦不可便以為禍蓋猶披旺鄉之鮮福也譬之戊辰木人九月生大運作五嵗起於壬戌六嵗遇癸亥木之長生十六嵗運至甲子乃木人暴敗之運兼遇甲子自死之金為木之身鬼豈不為災也至二十六嵗運遇乙丑雖是木人冠𢃄以其初入丑鄉尚𢃄甲子餘災而來故曰年雖逄於冠𢃄尚有餘災者歟或木行運至丁卯卯乃木旺之地若乍入辰鄉亦未可以言災蓋猶披旺鄉之鮮福而來也故曰乍入衰鄉猶披鮮福者歟所以行運有前後五年之說蓋由此耶通元經之行運若不厯冠𢃄臨官便逄旺地雖不厯艱辛而六年遭遇然物禁左道故以便衰或爾不壽行運亦當明此李同曰言大小行年雖出困敗初至冠𢃄之鄉猶有餘災如久病得瘥尚瘦弱也言大小運行年初出𢃄旺始入衰鄉尚𢃄旺氣如初罷官君子尚有威勢也曇瑩曰年由太嵗也時由運氣也年雖逄於冠𢃄由披暴敗之餘災運雖至於衰鄉尚帶旺宫之鮮福大假天元羸弱宫吉不及以為榮中下興隆卦凶不能成其咎王廷光曰天元者以干為祿也於天元言祿則中下興隆者乃支為命納音為身其可知也人之生也以得祿為榮以亡祿為辱故此篇必以天元為主也天元者主人有祿嵗運或於五行生旺之處而遇天祿者則應官易於榮顯也或大假天元五行無氣之謂羸弱雖所臨宫分之吉亦不及以為榮也譬之甲申水人得庚申運甲祿至子巳敗而逄庚為鬼斯可謂大假天元羸弱者哉雖干是甲申納音水吉旺之宫以其天元無氣雖宫吉亦不及為榮也中下興隆者中元曰支主命下元曰納音主身身命俱臨五行興旺之地雖八卦定分為凶亦不能致災也且如甲寅木得乙亥月身命木木得乙亥以逄生旺之氣可謂中下興隆者歟雖亥中有乾卦屬金金傷甲木為鬼卦之傷祿以其身命五行生旺故曰卦凶而終不能成其咎也此篇前後多論九宫八卦之說而非珞琭子三命之本意也觀前文理相貫則正義自可證矣李同曰凡言天元者即十干羸弱者指衰病死墓絶處也若天元羸弱九宫雖遇一吉三生不能解救其災也中謂支也下謂納音也此言二命有氣雖八卦遇五鬼絶命亦不成災也曇瑩曰天元者十干之謂也為天為尊為清為貴其於人也為祿人元者支神之謂也為地為卑為濁為富其於人也為福下元者納音之謂也為柔為剛為進為退其於人也失在爭戰逹乎純粹故元談云逹莫逹乎純粹窮莫窮乎戰爭若遇尊凶卑吉救療無功尊吉卑凶逄災自愈祿有三㑹災有五期王廷光曰積日為月積月為嵗嵗者日月之所積此言太嵗為辰之尊也推日以計運推月以計氣本命者大小之尊也以干為祿曰天元以支為命曰人元以納音為身曰地元干祿層陽者為身命之尊也以煞言之則太嵗為尊也以人言之則本命為尊也以三才言之則祿亦為尊也易曰天尊地卑乾坤定矣卑髙以陳貴賤位矣於此可以斷吉凶之由也五行四柱或上尊凶而下卑吉者卑勝尊也下尅上曰伐也尅我之謂鬼故占病者雖藥亦無功也或上尊吉下卑凶隂陽理順上制下曰治也我尅之謂財占病雖不藥而自愈也祿有三㑹者如甲祿在寅遇甲寅是正首之一祿也得甲午是暗合天德之㑹二祿也得甲戌是祿堂之㑹三祿也災有五期舊注以生旺死三鬼呼為五鬼者又何謂之五期也五期者以干支祿馬旺變遇死絶之地者是也一說以太嵗月建日辰大小運五處皆來朝㑹凶煞所聚於五行天地之氣刑尅本命斯亦謂之災有五期者歟譬之癸亥生辛酉月壬戌日庚子時叶命四十嵗大運丁巳小運乙巳太嵗壬寅月建戊申日辰庚申是日也凶神惡煞為災集㑹於元辰此謂之煞㑹五期者也蓋乙巳小運之火來生丁巳大運之土併來衝破癸亥本命三才之水絶於丁巳遇癸傷命於返吟之上巳中雖有驛馬又為壬寅太嵗之刑害也月建戊申之土又來六害本命為水壬三才之生鬼叶庚申日併害元辰來刑太嵗下之犯上寅巳申㑹起辜恩三刑亥酉年月並坐自刑四孟㑹四重劫煞期㑹破碎集於運元此命雖官入五品於是年是日不免以受傷刑而後惡死亡矣此所謂災有五期者歟李同曰祿為尊天元也支及納音為卑假令丙午水命人生於七月雖運馬而前行厯亥子運二十年丙午祿俱火也遭五鬼所害性命納音水主是也尊凶卑吉遇巳害庚於鬼鄉前逄辛丑丙辛喜合干火也丑土主相生不相尅是祿命尊吉納音水雖逄土是尊吉卑凶逄災自愈也運上消息倣此災福也天祿為福其類有三如甲祿在寅要本祿本命驛馬二位上見甲是也仍以五子元遁到處詳之五期者五鬼是也生死旺五鬼呼為五鬼經云三元逄五鬼閻羅三使追曇瑩曰立年為尊其胎月日時資以次之大運為尊其太嵗小運資以次之若遇本命與大運德合於建旺之鄉其嵗運日時凶而不能為咎大運與本命互戰於死囚之地其嵗運日時吉而未之為救故曰尊凶卑吉救療無功尊吉卑凶逄災自愈祿有三㑹者長生帝旺庫也其為至吉之地災有五期者衰病死敗絶其為至凶之地蓋祿即福之稱非干祿之祿也今之學者但舉三合而不知其然金逄巳酉丑木居亥卯未火得寅午戌水坐申子辰此是祿有三㑹也凶多吉少類大過之初爻福淺禍深喻同人之九五王廷光曰太極是生兩儀兩儀生四象四象生八卦八卦以定吉凶也卦之所占數之所合卦與數未嘗不相耦也且如凶多吉少之命以其休囚氣盛故不宜以求於進用也而有類於大過卦中初六爻體柔而乘剛其彖藉用白茅而在下無過世之才非有為之時可以遁世而避蓋位而無輔是以動而有悔也福淺禍深之命以其五行相尅而無氣亦非謀進用之宜喻如同人卦中九五應其彖先號咷而後笑大師克相遇者焉言兩剛之於五有尅之道六二以柔弱而勝剛强九五老陽太過以禍淺福深用則生咎矣珞琭子舉此二卦凶多吉少福淺禍深類喻於五行無氣之命蓋非特談卦也李同曰此論八卦立成變法假令澤風大過卦初爻發動變巽入乾呼為五鬼從第三位一變上為生氣二變中為天醫三變下為絶體四變中為游魂五變上為五鬼舊注歌云變巽來入五鬼鄉從巽入乾有低昻所以呼為小吉卦凶多即是鬼為殃言法此爻是也亦是變卦假令天火同人卦九五發動變乾為離卦呼為絶命從上位一變上為生氣二變中為天醫三變下為絶體四變中為游魂五變上為五鬼六變中為福德七變下為絶命舊注歌云假令乾卦化為離絶命之鄉例要知思此非也皆防偹細尋推言此喻九五爻是也曇瑩曰澤風大過只取內宫變巽入乾其為五鬼一變上為生氣在坎二變中為天醫在坤三變下為絶體在震四變中為游魂在兑五變中為五鬼在乾故云己巳戊辰度乾宫而脫厄天火同人只取外象變乾入離其為絶命一變上為生氣在兑二變中為天醫在震三變下為絶體在坤四變中為游魂在坎五變上為五鬼在巽六變中為福德在艮七變下為絶命在離故曰壬申癸酉入離宫而消亡聞喜不喜是六甲之盈虧當憂不憂賴五行之救助王廷光曰空亡者為天地虛脫之辰干祿不到之地是故逄德則致清閒遇煞則為絶滅行年嵗運若逄祿馬貴人則可以謂之喜矣復不為喜者蓋六甲中俱值十二位之空亡也空亡謂之天中煞為煞最重六陽命畏於陽宫六隂命畏其隂位運嵗行年或遇之以祿馬貴人而在空亡之上雖有福盈而為禍虧矣譬之甲辰人得壬寅見祿逄馬可以謂之喜矣而不以為喜者蓋甲辰旬中陽命至寅陽宫乃正空亡也兼以壬食於甲納音金火之相戰雖有祿馬而以空亡五行之虧盈相制所謂聞喜不喜是六甲之虧盈者哉當憂不憂者假如戊申生得丁酉而敗又遇破碎自刑斯可謂之憂矣所謂不憂者以丁酉之死火已化而為土矣是故土遇丁酉而不敗蓋子傳母道也故曰當憂不憂賴五行之救助李同曰虧損也盈益也假令三命太嵗大小行運食神干祿合㑹之鄉當有喜而不見喜者是六甲旬中或是空亡或在旺鬼之鄉災煞亡神之位或是運身反尅祿馬雖以有所盈却大有所虧以是之故不能為其喜也假令甲寅人運至申上謂之反吟又寅遇申刑祿命俱絶為旺金所制當憂而反不憂者為遁見壬申是干救神術云絶處逄父母變災為福又寅午戌驛馬在申若更胎月日時有所救助故無憂也曇瑩曰聞喜以盈為言盈者益也不喜以虧為言虧者損也損益之道由六甲而推之當憂不憂者但五行休廢處逄生是也只如木得甲申癸巳水金逄丁亥戊寅土水值辛巳壬寅金火得庚申己亥木故曰當憂不憂賴五行之救助八孤臨於五墓戌未東行六虛下於空亡自乾南首王廷光曰出於一為家包於一為嫁所歸宿之地也福以堅實為衍禍以虛耗為忒所謂癸巳者五行所不至之地也八孤者三位中除辰戌丑未乃五行之墓其餘八位者孤虛之辰或孤臨於墓如申酉人孤辰在亥而寡宿居未也五行之墓寄於四季之中其氣皆隨月建而東行也猶之戌與未乃木火之墓木自亥生火從寅起火木之氣皆自寅道之東行而鍾藏於戌未之墓故曰八孤臨於五墓戌未東行者歟六虛下於空亡者六虛乃六位空亡對衝辰是也譬如乙丑生人以亥為六隂正空亡亥衝巳為六虛亥為乾天巳為巽地巳乃南方之首辰故曰六虛下於空亡自乾南首李同曰八孤對處為六虛是六八虛位下先從孤數至虛故云下於空亡孤既東行虛則西回故云自乾南首生於此者防骨肉離異睽隔鄉閭一生散失迍蹇無餘財亦宜消息曇瑩曰甲子旬中戌亥為空亡蓋空亡對衝為太虛乃辰巳也戌亥是乾金之位在西極之北隅迤邐甲戌甲申自乾南首故寅申巳亥四孤之地辰戌丑未五墓之鄉向戌未而東行順空亡而逆轉天元一氣定侯伯之遷榮支作人元運商徒而得失王廷光曰貴者聖賢之所可及衆人無與焉富者衆人之所可至在聖賢不足以言之侯伯者天下之所貴者也故以天元一氣而推之商徒者天下之所謂富者也故以支作人元而推之矣十干祿乃天元之一氣天祿之所司貴富而已或祿𢃄天德官印貴食於五行四柱之中兼得生旺氣者則侯伯有遷榮之拜矣支日人元其有衝露言命之變則可以論商徒之得失矣如亥子水人得巳午火以為命財或寅卯木人得申酉金以為財鬼商賈之徒詳以人元定財物之得失餘皆倣此李同曰十二支為人元干者取根幹以得名支者象枝條而立義十干象天而動十二支象地而靜陽唱隂和夫行婦隨支配於干得以循環進退又以納音為地元凡看商賈之徒求財求福以十二支納音詳之曇瑩曰冲氣舒而山川秀發日月出而天地清明隂陽在人亦如此也向指天元清貴合言侯伯遷榮是知天元秀氣而吉將加臨者人得之貴也支元純粹而四柱比和者人得之富也直云富與貴而不言貧與賤者何也反此則為貧與賤耳須觀有氣無氣當究進神退神故下文云財命有氣財聚命衰之謂也但看財命有氣逄背祿而不貧若也財絶命衰縱建祿而不富王廷光曰人生以財命為主五行所尅者謂之財有氣謂財與命皆得寓之於五行生旺之地也雖四柱背祿使之無官亦不至貧賤也或命與財二者無氣雖得建坐祿使有小官亦不能致富貴也譬之庚寅木人尅丙戌土為財土旺在戌身命二木至東南戌雖背申之庚祿以其財命有氣逄背祿而不貧也若也財絶而命衰者如甲辰生人得丙寅火以金為財絶於寅辰土至寅而為命鬼兼遇空亡可謂財絶命衰矣雖月建坐祿以財命無氣所以縱建祿而不富者也李同曰此言祿財命財在長生臨官帝旺有氣之鄉生者逄背祿而不貧如甲寅人生於戊辰月受胎於己未月又戊戌日丑時生甲寅祿命以土為財如此者雖背祿一世富强名位發逹官必崇顯又若甲寅陽命生於乙亥月受胎於丙寅月庚寅日辛巳時此謂建祿一世貧窮常為不義之徒故有官職亦須卑下又如壬子陽命男受胎於四月生於正月甲戌日丙寅時生此乃但為富豪之人平生必無官職為以火為財生於有氣之地土為官是病絶之處故云富而無官又的然也其貧賤者生處俱弱不逄貴氣自可見也曇瑩曰前云以干為祿向背定其貧富蓋指財命兩宫各宜旺地又如庚申木命庚祿在申丁亥月中木生土旺順行大運背祿何貧又如火歸巳地逄金土向申中遇水皆曰財命有氣雖背祿而不貧財絶命衰者如戊戌木命丁巳月生雖於建祿財鄉其奈命衰財絶此法不但月上時日皆然故云財絶命衰雖建祿而不富若乃身旺鬼絶雖破命而長年鬼旺身衰逄建命而夭壽王廷光曰五行之理能制物而不為物之所制者勝為物勝者為鬼人受五行元氣必致勝物而不為物之所尅也五行納音之為身身之旺則尅我之鬼自然絶滅矣或鬼乘旺氣則我身必致衰矣是謂受制則夭制物則壽譬之庚申木人得壬寅之金運金尅木為鬼金絶於寅寅乃木旺之鄉然則寅申之破命以其身旺鬼絶雖破命復為長年也或庚申木人得壬申之金金旺木絶在申是謂鬼旺而身衰者也雖二申建命亦不免於夭壽者歟李同曰身者以納音言之也以尅我者為鬼十二支定壽數是命與身定其修短也身旺鬼絶者如丙申火正月生衝破處水鬼病死即是長年鬼旺身衰者如己巳木人四月生納音木病金鬼長生雖建命必夭壽也舊書云建命主長壽破命主夭殤故竹輪經云建命未必延長破命未必夭壽珞琭子所以消息也曇瑩曰以其本命旺宫逄絶鬼者是也又如火在巳宫值水木居寅地逄金土向申鄉遇木金歸亥中逄火設處反吟六害雖破命而長年以其本命衰鄉逄旺鬼者是也又如土到寅中見木火歸亥地逄水金在午鄉得火木居申位逄金故云鬼旺身衰逄建命而夭夀背祿逐馬守窮途而恓惶祿馬同鄉不三台而八座王廷光曰祿者所謂爵祿之祿也馬者所謂車馬之馬也人得之則榮失之則辱天下之榮辱有祿馬之在元命矣况祿馬為貴煞之窮也人所不知者其祿馬有死活焉譬如甲人祿在寅寅為死祿以五子元遁甲至戌乃為活祿也蓋戌為祿堂者歟甲子人驛馬在寅寅為驛乃當生之死驛耳遁見丙寅甲人以丙為活馬也申子人逄甲為活祿遇丙為活馬以寅為死祿馬耳所謂背祿逐馬者舊說以甲戌人四月生背寅祿而逐申馬義亦非也蓋是祿馬皆可以致富貴既有馬之可逐安得守窮途而恓惶者哉蓋背如隂陽之相背非所謂向人也逐者如其散逐之逐非謂追也祿馬二者皆失所以守窮途而恓惶也猶之癸亥人得正月甲寅癸祿在子寅以背之驛馬在己寅以刑之前因刑而逐去其馬後因背而不能及祿二者俱失斯所謂守窮途而恓惶者歟蓋馬貴乎乘之若逐之則非也祿馬同鄉者如甲申生人丁丑月己亥日丙寅時命生時於帝座上㑹祿馬同鄉兼甲申己亥丙寅皆禀五行清明生氣故應末候於生時是命晚年有非常之遇所以位至三公壽踰七十李同曰竹輪經云祿馬在靣前在背後向前趂馬祿又不來回住待祿馬又漸逺縱有衣食不免勞苦假令甲戌男四月生是背祿逐馬也假令六甲申子辰人正月生之類不惟生月若生日生時遇之尤貴也曇瑩曰每見貴人食祿無非在祿馬之鄉大都得福享壽無出祿馬矣今言背祿逐馬人得之賤也運居中道而財命休囚馬既疾矣祿又背矣安得不困苦哉自財命有氣至窮途恓惶反復道也祿馬同鄉用日干得祿時干遁馬五子元求之則可知也假令庚午人得壬辰日丁未時便以丁壬庚子遁至戊申緣庚祿午馬在申故也又與本命相得者尤嘉官崇位顯定知夾祿之鄉小盈大虧恐是劫財之地王廷光曰鬼谷子云祿馬在望則官崇而位顯譬之癸祿在子子之前後辰遇癸四柱得之者曰夾祿又謂之拱祿祿特虛拱以待用及癸水旺於子祿之所主者官爵也如此則官爵自然崇顯也小盈大虧者如丁丑得丙寅水以尅火為財丙寅乃自生之火則可謂小盈丑人以孤劫在寅丑土受寅木之制而為財化鬼歟斯所以為大虧矣夫劫煞者乃巳酉丑金至寅而絶也絶中逄劫雖有小盈而致大虧者歟李同曰小盈者謂祿命雖有三二吉處若值劫財之地則為大虧也此出洞靈祕論三命以財旺為吉人以有財為福曇瑩曰官印為天祿同官者人得之貴也如戊逄乙巳壬得巳亥丙遇癸巳癸逄戊子然則天官夾祿無不出羣其中㑹吉㑹凶曽未定也又如丙辰土命癸巳月生丙祿在巳土以水為財劫煞却居巳財既絶矣命又衰矣即曰小盈大虧恐是劫財之地生月𢃄祿入仕居赫奕之尊重犯竒儀藴藉抱出羣之器王廷光曰所謂祿以代耕則指貴者之事而耕者則指賤而在野者言之也以祿為貴者之事故云居赫奕之尊經云天祿者享貴富之最竒儀者資出倫之材珞琭子云生月為運元或𢃄天祿生旺之氣而行運者則平生溫厚為福之多也然舉以生月如生日生時皆欲得冠𢃄天祿為福之厚也或四柱五行互相𢃄祿兼乘生旺之氣者則入仕多居赫奕之尊矣所謂𢃄祿者不必謂専生天祿者也如甲祿在寅寅午戌中見甲者皆是也重犯竒儀者乙丙丁為三竒戊己庚辛壬癸為六儀十干用九而隨去其甲者之謂竒儀也如乙巳生得辛巳月日辛為儀乙日竒乙以辛巳為生成官又坐官祿長生學館二巳乃重犯竒儀矣或謂辛巳人得丙申月丙辰日是一儀合二竒此亦謂之二生犯竒儀者也竒儀者天地隂陽耦合英秀之氣宜為學者約之故曰藴抱出羣之器李同曰生月日時併𢃄本祿若入仕必須官職崇顯也竒者指乙丙丁甲戊庚為三竒也儀者常以子加於寅順數至年月見本命即是重犯竒儀也曇瑩曰本命祿元與生月同者是也其祿元用日干求之假令庚子人甲申月但得乙庚之日便用丙子推之甲申是也其生月𢃄祿并祿馬同鄉但得天元與納音同者亦可言之甲戊庚乙丙丁法天地二儀此云三竒也重犯者居赫奕之尊抱出羣之器隂男陽女時觀出入之年隂女陽男更看元辰之嵗王廷光曰男陽也或禀五行之隂而生則謂之隂男也女隂也或受五行之陽而生則謂之陽女也隂男陽女禀五行之氣不順是以大運厯過去節氣不順者時觀出運入運之年而有吉凶之變氣順者雖不以出入之年為應亦不可與元辰之厄㑹李同曰凡出運入運時多主災滯衝前一辰為元辰若大小二運太嵗併逄於元辰有災滯决矣曇瑩曰男女之别男尊女卑陽位本男隂位本女今言隂男陽女失其序矣既失其序則運有逆順也大運出入之年慮招不測之咎陽男隂女各得其宜大運遷變之年更看元辰等煞是故吉凶悔吝生乎動者也與生地之相逄宜退身而避位凶㑹吉㑹伏吟反吟隂錯陽差天衝地擊王廷光曰五行有父子相繼之道蓋父壯則子幼子强則父衰所謂與生地之相逄如戊申得壬申戊申自生之土則生壬申之金金至申而臨官土信金義父傳子道也及其子父同處子既往矣父以功成自當告退蓋生者不生物不兩立者歟是知五行他生而我休子代父位也故曰與生地之相逄宜退身而避位耳凶㑹吉㑹者如癸亥人三元受水一氣或行年嵗運㑹於己卯水死於卯而遇己卯土為鬼則祿命身三元皆死故曰凶㑹一說以行年嵗運祿馬五處皆在生旺之地而來共生我元命之謂吉㑹皆來尅我之謂凶㑹也衝命一辰曰反吟隂錯陽差者物以陽熙以隂凝二氣不相戾故天地相合以降甘露此言其向而不乖也以隂遇隂曰錯以陽遇陽曰差純隂則不成純陽則不生此所謂隂陽差錯者歟人之一身隂錯陽差則非正也故所作多竒而不耦矣天衝地擊者戌亥曰天羅辰巳為地網衝擊乃五行隂陽絶滅之地嵗運得此更在返吟伏吟之上則其為凶為禍可知也四柱寓於其上縱貴而不壽李同曰此四句言五行災福變通不定不可執一而言也凶㑹之中復有吉者吉㑹之中復有凶者反吟伏吟合災却有四主本相救則吉若胎月日時俱弱方有凶㑹隂錯謂陽女隂男元辰在衝後一辰陽差謂陽男隂女元辰在衝前一辰天衝者謂戌亥為天門地擊者謂辰巳為地户言有差錯衝擊神是孤虛神也曇瑩曰古所謂不知命無以為君子蓋命者天之默定也若知進退存亡其惟聖人乎與生地相逄宜退身避位者本命長生中逄旺鬼是也即如金逄乙巳火土遇庚申木火見甲寅水木逄辛亥金得之於四柱或臨大運者宜以節用謹身退身避位隂陽五位支干四柱互相暗戰謂之駁雜伏吟反吟㑹凶㑹吉曽未定也且如甲子金命伏吟庚子土為吉戊子火為凶反吟以戊午火為凶庚午土為吉切忌隂錯陽差天衝地擊如其甲木畏於庚金子水傷於午火或逄四煞五鬼六害七傷地網天羅三元九宫福臻成慶禍併危疑扶兮速速抑乃遲遲王廷光曰五行之秀氣為冲和為福祥夫何故以得氣之正也反此則為煞為鬼為害為傷之類是也窮理可以知幽明之微盡性可以知生死之妙所為四煞五鬼者或謂命前四辰曰四煞生死旺三鬼呼為五鬼者非也四煞者寅申巳亥四衝之劫者是也五鬼者以納音尅我之謂鬼鬼在生敗旺死絶五處見者是也六害者如寅人得己卯人得辰者是也命如逄四煞劫㑹五鬼相臨六害集命斯人也必主七傷之事七傷者傷害父母妻子兄弟自身是也天羅地網乃陽氣入墓絶滅之地遇者故多凶也然巳上皆神煞之為凶或三元九宫五行生旺為福之臻尚可以成吉慶耳蓋五行為神煞之先或以值凶煞者兼三元九宫五行四柱又在衰敗之地所謂禍併危疑者歟是謂煞扶兮速速成灾福抑乃遲遲為慶李同曰一吉二宜三生四殺五鬼六害七傷八難九厄此是三元九宫內諸神煞之名此言九宫之法及地網天羅若祿命吉㑹九宫又吉則是福臻成慶言得福神相扶故云扶兮速速也若祿命災期九宮不吉又遇地網天羅則是禍併危疑言其無福神相扶故云抑乃遲遲也曇瑩曰四煞謂辰戌丑未五鬼謂五行之鬼六害謂寅巳之類七傷謂劫煞等神戌亥謂之天羅辰巳謂之地網相得者為吉相尅者為凶禍併則危疑福臻則成慶福輕乎羽扶兮速速禍重於地抑乃遲遲其發若機括其由是非之謂也厯貴地而待時遇比肩而爭競至若人疲馬劣猶託財旺之鄉王廷光曰兩貴不足以相爭蓋兩貴必有一勝者焉兩賤不足以相使蓋兩賤必有一下者焉公侯將相其命已素定矣然運氣若有比肩者一般以厯貴强祿馬之地雖欲除拜姑待其時耳蓋二者須爭競較量錙銖優劣而定先後之拜譬如元命格相同而年運皆厯貴强之地而同年共取一魁須當爭較得福最者為之矣人疲馬劣者本命支曰人元兼驛馬或在五行衰敗無氣之處則不逹如甲子干支人元立金至子已死矣子人以寅為馬屬木至子而敗此所謂人疲馬劣者與其所以不為災者蓋戊申土尅水為財水土俱旺在子故曰猶託財旺之鄉李同曰若運入貴神之地待時數符合則有福慶若遇災福力齊如生育並行之運必有爭競弱者伏强此㫖幽深在吉凶煞神升降言之若祿馬氣衰但得祿財命財旺相亦可扶持曇瑩曰古所謂雖有鎡基不如待時蓋厯其貴地須待時也比肩爭競由兩庚奪一丁兩丙食一戊遇之官印或在吉神如此者交相是非比肩爭競人疲馬劣者其如戊午火命驛馬在申申中金旺火衰曰人疲馬劣猶必託財旺之鄉也或乃財旺祿衰建馬何避衝掩嵗臨尚不為災年登故宜獲福王廷光曰尅之者為財寓之者為祿乘之者為馬祿財驛馬兼得之則富貴兩全者也或偏得之則又次焉或天祿雖衰而身財猶旺兼遇驛馬來乘又何避之有也縱使衝掩嵗臨尚且不為災變况後嵗運更在五行生旺㑹合豐登之處故宜獲福之多矣猶之癸亥生得乙巳嵗遇祿水雖絶在巳而以水人尅火為財火旺在巳兼巳上乘馬雖己亥之衝臨於返吟之上而以身財之旺故不以為災變矣或嵗運不相衝臨而在三合五行生旺之地又逄財遇馬可謂年嵗豐登故宜獲福者哉李同曰若財旺祿衰戰馬之鄉又何疑避雖太嵗加臨或衝破本命在鬼旺身絶之位得財馬相扶合災不災若太嵗逄喜合祿命有氣之處是年登故宜獲福矣曇瑩曰財旺祿衰者其如甲戌火命月建壬申甲祿既絶馬立財鄉故云財旺祿衰建馬何避大抵馬是扶身之寶祿為養命之源祿乘貴而遷官馬運財而獲富掩者伏吟也衝者反吟也然衝與掩唯善與惡致其不寧也居安慮危君子之道也相生則吉相尅則凶由是年登故宜獲福大吉生逄小吉反夀長年天罡運至天魁寄生續夀王廷光曰顔子雖賢而有不幸之短命盜跖雖凶而得人間之上夀是則修短之數豈不有命耶蓋命之所遇者有時時之所繫者吉凶異耳舊說以乙丑六月生遁見癸未納音金尅木為身才所以反夀則長年矣其意以謂尅我之謂夭我尅之謂夀然則言乙丑納音而不論其餘或遇辛未癸巳丑之類又何以取其尅也此蓋非謂納音取尅正言丑人得未耳丑未乃返吟而何以謂之反夀長年也蓋丑為大吉乃金之墓未為小吉乃木之庫以丑中之金氣來尅未中之木氣五行上尅下曰治金木變化仁義相濟魂魄相應夫婦相儀損乃益也如此則反夀以長年者歟或未人得丑則尊辱卑榮妻居夫位隂陽不正則為不夀而為夭矣天罡運至天魁者是亦論返吟中辰生人得戌者也天罡是辰辰中有水氣之所鍾也天魁是戌戌中有火氣之所鍾也辰中之水尅戌中之火為精為神為夫為婦尊卑定位水火既濟五行氣和如此則可謂寄生續夀者矣或戌人得辰運夫處妻位隂陽不正則為返吟之破命者歟二說蓋四季中有五行之墓而有夫婦尊卑之定位在焉李同曰大吉者丑位也小吉者未位也此後八句再明反吟伏吟吉凶無固必之義假令乙丑隂命男在六月生遁見癸未木雖本命生月相尅合主夭傷却為乙丑納音金尅癸未納音木是反夀長年舊歌云便將生月用為身却以納音回作命身來尅命短天年命往尅身長夀命天罡者辰位也天魁者戌位也假令戊辰陽命男在三月生計五嵗起運順行五十六運在壬戌運下納音是水來生戊辰木又且生於三月天德月德俱在壬寄在戌上又生木故云寄生續夀曇瑩曰以下四節並用真印始得其詳嘗試言之乙丑金印癸未木印壬辰水印甲戌火印丙辰土印長年續夀惟寄與反除此五干未有知其然也緣丑為大吉中有乙木存焉未為小吉上有癸水在焉癸水生其乙木增益祿元反壽長年莫非是也天罡辰也天魁戌也戌中有甲辰中有壬壬水生其甲木甲木續其丙火故曰天罡運至天魁寄生續夀大要十干為祿定人修短故也從魁抵蒼龍之宿財自天來曇瑩曰酉為昴胃之鄉從魁是也卯曰蒼龍之宿太衝是也嘗試論之以支元取財今言天來者何也緣酉上有辛卯中有乙辛金制其乙木故云財自天來太衝臨昴胃之鄉人元有害曇瑩曰以其酉金尅其卯木乙木畏於辛金祿既被傷人元受尅若然者酉人遇卯為吉卯人逄酉為凶位列尊卑剛柔斷矣金祿窮於正首庚重辛輕木人困於金鄉寅深卯淺李同曰金祿者且舉庚辛二祿餘門同也庚重辛輕者庚辛至寅位為絶庚重者多為破祿故云重也辛輕者辛到寅上有天乙貴人故為輕也木人謂寅卯二命金鄉指申酉為鬼方大抵隂遇陽則和陽見陽則多競也曇瑩曰隂極生陽陽極生隂隂陽自然之理也陽金生於巳而死於子絶於寅隂金生於子而死於巳絶於卯正死正生之謂重偏生偏死之謂輕次以陽木生於亥而絶於申隂木生於午而絶於酉陽木申深而酉淺隂木申淺而酉深蓋寅卯指羣木之情庚辛舉衆金之類申是水生之地木曰困寅乃生火之宫金云窮也妙在識其通變拙說猶神巫瞽眛於調絃難希律吕王廷光曰易曰一闔一闢之謂變往來不窮之謂通孔子作易至說卦然後言妙妙萬物然後識通變盈虛之數隂陽之理至妙藏焉賢者得之妙逹緯象通知隂陽至於談命其說雖拙其應若神愚者失之常為物疑安能通其性命之妙如巫瞽之昧於調絃而希律吕之合也李同曰易繫辭云通變之謂事又云易窮則變變則通通則久又云變通配四時又云一闔一闢謂之變往來不窮謂之通又云化而裁之謂之變推而行之謂之通此賦言消息之功其得失在識通變無窮之理則雖拙說亦如神也若不識通變之妙則如巫瞽不曉其調絃者則難求合於律吕也曇瑩曰易窮則變變則通通變之謂事也要言以㑹道合理而忘言蓋理由言彰言不越理識其通變拙說猶神然瞽者無以與乎文章之觀聾者無以與乎鐘鼓之聲况語希夷妙道哉故以昧於調絃難希律吕喻之耳庚辛臨於甲乙君子可以求官北人運在南方貿易獲其厚利王廷光曰論金木之刑則制以致用論金木之理則相繼以終始故金木子也木金父也金父用子則金木相得甲以辛為官乙以庚為官如庚辛之運嵗來臨甲乙之人故曰君子可以求官者小人反以為鬼也北人運至南方者亥子皆北方之水也巳午皆南方之火也以水人行運至火鄉我尅之謂財所以貿易獲其厚利也或謂癸壬之至午亦是者非也壬癸是祿己午是命干支不相入如壬癸人謂丙丁則可以謂之祿財而已談命者必當分祿命身為之命也以干配祿以支合命以納音論身之為三命李同曰甲以辛為祿官乙以庚為祿官太嵗大小年相符求官必遂餘十干准此言君子則求官小人逄之則有官災前言十干尅我者納音相配與天官此則言干支若是壬癸亥子至己午之位我尅者為財故獲厚利是也曇瑩曰甲乙以庚辛為官印其用有是與非但君子得以為官小人遇之為鬼何以知其然也蓋獨稱君子求官而不言小人為福耳正北壬癸之位其卦屬坎正南丙丁之位其卦為離坎屬水曰潤下離屬火曰炎上兩者交通合成既濟加之水歸火地運至財鄉故云北人運至南方貿易獲其厚利也聞朝歡而旋泣為盛火之炎陽尅禍福之賒遙則多因於水土王廷光曰火主禮禮中則止不可太過禮煩則亂火之氣炎木之氣溫炎與溫未嘗相雜云火木之生則輕清可見矣土之形厚而豐水之形圓而下言水土之同源則重濁亦可知矣格局嵗運得五行火木之炎陽其為謀用行藏則易於發故曰聞朝歡而旋泣者也或犯水土之多必傷於重濁更不逄生氣則動作云為多遲滯也火水之命五行則尅彼為財彼尅為鬼禍福之來皆云不快故云尅禍福之賒遙多因水土也此蓋論火木性快易發易休水土性遲難成難敗李同曰火性炎上若火人遇火朝歡旋泣言速也土重濁不動水潤下盈科乃進凡生尅禍福皆遲故云賒遙也曇瑩曰火之為性暴而多傷故鑽木而烟飛擊石而光發朝歡旋泣今是昨非由火𫝊薪莫知其極也水土為物其性柔和致於禍福之端得其遲緩之意蓋智與信也金木未能成器聽哀樂以難名似木盛而花繁狀密雲而不雨王廷光曰五行之中唯金木性不自専須在假物而後成器也木陽神也能自變其形曲直故或喬而直或樛以曲也金隂精也不能自化之而從火革故能制刻以成器也木得金之制而成才金木之制謂哀樂者同蓋木主春其性仁春則敷榮萬物發生可以為樂也金主秋其性義秋則揫斂萬物散殺可以為哀也木無金而不器金無火而不成為哀為樂難以名狀似木盛花繁密雲不雨是謂為虛聲無實跡者焉李同曰此言金木未成器之處或相制尅則難聽或哀或樂之名此珞琭子之深㫖本命支干納音并生月上詳之若木人當生見金行運亦逄金定其比和也曇瑩曰且金不能成器惟火以陶鎔木未能成功假金以雕刻故樂必以哀為主益必以損為先木盛花繁秀而不實密雲不雨晦而難明兩在不測之間擬議生矣大都旺而不可無制衰而不可無生得處比和復歸純粹乘軒衣冕金火何多位劣班卑隂陽不定王廷光曰五行木為文而火為武水為賔而土為主金得火備而為上貴斯乃體物知用之人軒車羽蓋天富十㑹則身厯貴地乘軒衣冕者乃四柱遇官鬼生旺之鄉者是也如庚人得戊午辛人得丙寅之類金沒火革而有造化之妙貴格之中須欲得金火之相配然亦欲合於隂陽之耦也或庚人得丁辛人得丙之謂天官𢃄德隂陽相配五行氣順加以祿馬相乘者則乘軒衣冕之望也或庚人得丙辛人得丁純隂純陽為尅為鬼是謂隂陽不定者也如此者雖有小官亦致位劣班卑安能顯逹者歟李同曰此言四柱十干之中金火多者如六辛人遇丙為官又不可多得其中者則有官崇乘軒衣冕也若被金火多者却位劣而班卑如甲人要庚辛為官若金多則甲木反有所損故云隂陽不定曇瑩曰大凡四柱五行火金多者不足貴也金剛而不能順物火暴而難益其生為氣不常故君子之道鮮矣身卑位髙者危身髙位卑者屈隂陽得位為年支干始終無失是以龍吟虎嘯風雨助其休祥火勢將興故先烟而後𦦨王廷光曰水流濕火就燥雲從龍風從虎聖人作而萬物覩本乎天者親上本乎地者親下則各從其類者哉所謂龍者東方木也而金氣應之則吟而雨至虎西方金也而木氣應之則嘯而風生皆以類感猶人之遭遇亦緣三元四柱五行乘生旺之氣則動無不吉者歟若夫初凶後吉者則不然譬之火之始然先烟而後熖也傳曰烟生於火而能欎火也豈非火外景而晦烟逹而得生不猶人之始凶而終吉者哉李同曰此作賦之意蓋為上文言五行相尅或木成器合貴不貴此又言相尅相生因以龍虎烟熖為喻若五行各得其所則如龍行雨降虎嘯風生又如火旺先有其烟後有其熖則前人之注引甲寅人三月生者非也曇瑩曰龍吟雨降虎嘯風生故曰雲從龍風從虎則各從其類也滋於枯槁助以休祥則風以散之雨以潤之也欲測將興之事為於未有之前是知先發其烟然後有𦦨龍吟虎嘯當以戊辰甲寅其義甚詳不然但遇寅與辰相得是也每見凶中有吉吉乃先凶吉中有凶凶為吉兆王廷光曰吉凶之相仍禍福之相因隂陽之常理也世固有吉人凶於吉凶人吉於凶者君子所不道也亦道其常者而已論五行貴而不純粹者則吉凶相半也人之祿馬貴人為吉之兆而以五行休囚無氣故因吉以致凶耳譬如甲子生人得丙寅坐祿乘馬遇食斯可以謂之吉矣以甲子自死之金而絶於寅凡遇丙寅生火制之為身鬼斯可以謂之凶矣雖然有鬼化為官者財化為鬼者在智者以輕重取之故曰吉中有凶凶為吉兆李同曰凡行運有前五年凶後五年吉者前五年吉後五年凶者假令癸未生人十一月運到酉上三水俱敗故不可也殊不知酉中有辛又是辛酉此為印綬之鄉反有喜也故云凶中有吉曇瑩曰凶若勝吉吉藴凶中吉若勝凶凶藏吉內駁雜生於純粹比和出於戰爭故曰吉中有凶凶為吉兆禍旬向末言福可以迎推才入衰鄉論災宜其逆課男迎女送否泰交居隂陽二氣逆順折除王廷光曰五行順則福生逆則災至和以致祥乖以致亂此論災福由之於行運也然行運有前後五年之說蓋餘福耳一旬為十嵗將臨出運曰向末言新福可以迎推甲戌火運乍入衰鄉而尚有旺鄉之餘福亦未可便謂之災福宜逆課其為福耳陽男隂女大運順行以其氣之不逆者也每遇出災入吉之運而可以迎新福而導舊災矣陽女隂男大運逆行以其氣之不順者也則可以守舊福而避新災耳故謂男迎女送者歟否泰交居者此云泰卦為三陽之首小運則男起丙寅否卦為七月之辰女子則運行於坤位今甲巳生人一嵗男起丙寅女起壬申者是也所謂隂陽二氣者蓋言小運乃年之氣也大運乃月之氣也經曰日干為運月干為氣凝神於三命之中小運則從生日以交大運則論其氣而過蓋二氣運行由我言命者也或謂隨太嵗而過者非也蓋太嵗為神煞之首未生我時巳位矣故曰隂陽二氣逆順折除折除之法已載於前李同曰此言將出災運故交福運尚有餘災欲徹之時可以迎新福救之初入衰鄉者逆而課之前五年自吉運中來猶披鮮福未可言災男詳大運初入之年迎何災福故云迎也女詳大運將出之年送何災福故云送也隂男陽女陽男隂女依逆順行運折除看新舊運上有何吉凶以運數言之也曇瑩曰隂陽男女之别吉凶禍福之稱此論行運各指長生次於衰地即如金生於巳而衰於戍戌上男順行於死囚休廢女逆行於帝旺臨官又如巳中男順旺於申酉之鄉女逆困於寅卯之地故曰禍旬向末言福可以迎推才入衰鄉論災宜其逆課占其金木之內顯於方所分野標其南北之間恐不利於往來曇瑩曰南北以水火之分顯於方所分野金木指東西之位恐不利於往來皆以八卦變通向三避五行藏動止出入施為禍福吉凶不可不察一旬之內於年中而問干一嵗之中向月中而求日向三避五指方靣以窮通審吉量凶述嵗中之否泰曇瑩曰處定求動尅未進而難遷得月問年向月中而求日述嵗中否泰指方靣窮通向三者生氣福德天醫是也避五者絶體遊魂五鬼絶命本宫是也又云向三向而避五位是則一白二黑三碧四緑五黃六白七赤八白九紫此乃六輪八卦九宫之法壬癸秋生而冬旺亥子同途甲乙夏死而春榮寅卯一類曇瑩曰庚為衆金之主故居申而生水水歸亥子冬天而旺壬為聚水之源故居亥而生木木歸寅卯春天而壯甲為羣木之首故居寅而生火火歸己午夏天而旺戊為衆土之尊故居巳而生金金歸申酉秋天而旺壬癸亥子一類水也水生於申而旺於子甲乙寅卯一類木也木旺於卯而死於午故曰壬癸秋生而冬旺甲乙夏死而春榮丙寅丁卯秋天宜以保持己巳戊辰度乾宫而脫厄曇瑩曰丙寅丁卯舉火之類火既尅金秋天保持者何也言水生於秋故也己巳戊辰舉木之類木既生亥乾宫脫厄者何也言亥有乾金故也自癸壬秋生冬旺止脫厄於乾宫皆明五行休旺之情造化自然之理值病憂病逄生得生旺相峥嶸休囚滅絶曇瑩曰值病憂病以休囚滅絶而言逄生得生以旺相峥嶸為義值病憂病者五行病中逄鬼是也其如木值辛巳金火值甲申水土遇庚寅木金逄乙亥火如此之類休囚滅絶逄生得生者五行生處逄生是也其如木臨癸亥水火得庚寅木如水值壬申金金逄丁巳土如此之類旺相峥嶸或逄之嵗運或值之鎡基更看始終隨宜消息論其眷屬憂以死絶曇瑩曰生我者為父母我生者為子孫尅我者為官鬼我尅者為妻財比和者為兄弟慮在空亡死絶之地憂居休囚衰敗之鄉墓在鬼中危疑者甚曇瑩曰墓在鬼中者以其五行墓中逄鬼是也只如金畏己丑火木憂乙未金水懼丙辰土土慮戊辰木火怕壬戌水如此之格危疑者甚足下臨喪靣前可見曇瑩曰足下臨喪靣前可見以其命前二辰為喪門命後二辰為吊客或太嵗諸煞大小運臨憂其不測之災慮有外服之象慿隂察其陽禍嵗星莫犯於孤辰恃陽鑑以隂災天年忌逢於寡宿曇瑩曰嘗試論其寅卯辰人巳為孤辰丑為寡宿其寅辰是陽之位丑巳為隂之位故云慿隂察其陽禍嵗星莫犯於孤辰己未以申為孤辰辰為寡宿未巳為隂之位辰申是陽之位故曰恃陽鑑以隂災天年忌逄於寡宿天年猶小運也嵗星猶太嵗也陽以孤辰為重隂以寡宿為深先論二氣次課延生父病推其子祿妻災課以夫年曇瑩曰五行相生為父子其為傳受之氣青赤等類是也隂陽相制為夫妻其為交合之辰支干等類是也假令金病無疑畏火急求水以救之蓋金生水為子水尅火故也又如金之災者恐值火也且看火之休旺如何蓋尅我者為夫此乃救解二法最為詳要三宫元吉禍遲可以延推始末皆凶災忽來而迅速曇瑩曰三元得地而吉四柱遞合為崇蓋三元者祿命身也互乘旺氣福德加臨如此者得禍延遲獲福非鮮其或始終駁尅髙下相陵則福且逺矣災來速矣宅墓受煞落梁塵以呻吟喪吊臨門變宫啇為薤露曇瑩曰古之善歌者有繞梁之聲善唱者合宫啇之曲今易以呻吟愁歎變為薤露挽歌則喪吊臨門宅墓受煞故也常以命前五辰為宅命後五辰為墓又以命前二辰為喪門命後二辰為吊客其或太嵗凶煞臨併大小運限刑衝必致凶禍切宜預避干推兩重防災於元首之門支折三輕慎禍於股肱之內下元一氣周居去住之期曇瑩曰三元兩值受尅防災於頭目胸背之間支辰三次逄傷遭禍於腹臟股肱之內下元一氣納音是也其主宰五行逐支干遷變故曰周居去住之期而成否泰仁而不仁慮傷伐於戊巳曇瑩曰仁者木也戊巳土也木本性仁慮貪戊巳利動君子反有不仁此則逄之為災去之為福至於寢食侍衛物有鬼物人有鬼人逄之為災去之為福曇瑩曰君子晨興暮寢常宜攝衛護持其或食息弗調動過生疾於是合中逄鬼吉內獲凶雖或人情所為亦被隂陽所宰就中裸形夾煞魄往酆都所犯有傷魂歸岱嶺曇瑩曰嘗論裸形戴花乃沐浴中𢃄合也加以凶神交併惡煞刑衝得之於人則耽荒財色逐妄耗真所犯之神積虧成損有如此者中道而夭曽不盡其天年岱嶺酆都乃隂府冥山之謂也常以庚辰人逄乙酉引之為喻蓋天地合中金旺水敗或乃行來出入抵犯凶方嫁娶修營路登黃黑災福在嵗年之位內發覺由時日之擊揚曇瑩曰殊常異舊變處為萌其或嫁娶修營行方出入宜擇善地先要預防雖非三命之談亦備九宫之法詳以逐年神煞身黑身黃其由時日擊揚必在嵗年位內五神相尅三生定命曇瑩曰五神五行也三生三元也凡觀人命須䆒根基用三元定官以五行相配况吉凶禍福豈偶然哉與夫析理精微不在支離蔓述每見貴人食祿無非祿馬之鄉曇瑩曰此法以日時祿馬五子元求之或相生於本命建旺之鄉或駁尅於當生滅絶之地至若運限加臨必有吉凶之兆源濁伏吟惆悵歇宫之地曇瑩曰凡遇五行而造化滅絶空亡更逄運限刑衝惡星交併主多憂少樂必招夭亡惆悵吟呻故號歇宫之地狂橫起於勾絞曇瑩曰陽命以前三辰為勾後三辰為絞隂命以前三辰為絞後三辰為勾其或交臨運限乃招狂橫之災禍敗發於元亡曇瑩曰此論元辰亡神也元辰以陽男隂女衝前一辰隂男陽女衝後一辰其次亡神以寅午戌在巳巳酉丑在申申子辰在亥亥卯未在寅更值當生凶煞嵗運刑星多因官事勾連訟端縈絆加以宅墓同處少樂多憂故下文云宅墓同處恐少樂而多憂萬里回還乃是三歸之地曇瑩曰三歸之地乃辰戌丑未此云三邱亦云五墓故以歸根復命返本還源凡此四辰以應回還之象四煞之父多生五鬼之男曇瑩曰或云劫災天地四煞或以辰戌丑未為四隂煞此用遊年太嵗或大小兩運全其四煞三元受傷於年養子乃是五鬼之男反制受尅不純粹也六害之徒命有七傷之事曇瑩曰凡看人命或值一兩重六害或展轉凶煞併衝如此之人命有七傷之事眷屬情同水火相逄於沐浴之鄉曇瑩曰凡本命沐浴中相尅是也此主六親寡合朋友匪和凡處求謀故難成就骨肉中道分離孤宿猶嫌於隔角曇瑩曰子午卯酉中有死氣辰戌丑未四墓之鄉人或值之孤中孤也斯主夫妻暌隔財散人離眷屬喪亡與時相逆常以寅卯辰居午巳午未在酉申酉戌逄子亥子丑臨卯此是孤神也辰戌丑未寡宿亦然以寅申巳亥為天地之四角蓋隔此四位孤神也須要明其神煞輕重較量身尅煞而尚輕煞尅身而尤重曇瑩曰吉凶神煞百有餘年或得於日時之間或逄於嵗運之內但以煞尅身而重身尅煞而輕更要隨器審詳臨機消息至於循環八卦因河洛之遺文略之定為一端究之翻成萬緒曇瑩曰易有太極是生兩儀兩儀生四象四象生八卦河出八卦之圖洛出五行之書然後聖人以蓍龜之象數信乎其不疑矣於是作易而明吉凶以斷天下之疑以定天下之業故曰剛柔相摩八卦相蕩終成萬緒始出一端若值攀鞍踐祿逄之則佩印乘軒曇瑩曰攀鞍有位與天元𢃄合者人得之貴也須要加臨吉將身運資生更於旺相之宫始可言其福矣馬劣財微遇之則流而不返曇瑩曰驛馬微劣財命休囚則塗炭辛勤終無成立此以四柱臨之可定飄蕩無歸占除望拜甲午以四八為期口舌文書己亥慎三十有二王廷光曰玉册曰天數得平地數得終天地合得中運之凶吉五行之數有太過不及皆非吉兆此篇論以行年大小運由之於數而已數有竒偶之變吉凶自此以生也所謂甲午以四八為期者四八三十二嵗是年也太嵗乙丑小運丁酉乙丑乃金人五行正印蓋遇天乙貴神丁酉是甲人天官暗印之鄉而運與嵗之合旺氣故有占除望拜之兆也己亥慎三十有二者以是年太嵗庚午小運丁酉木至午死酉絶亥午酉㑹命之自刑巳為斂口丁為吹舌方刑為文宇故曰口舌文書己亥慎三十有二李同曰此舉甲午人一例欲使後人用逰年太嵗求其災福四八者三十二嵗也甲午人及己亥木為命宅三十二嵗逄乙丑年驛馬入宅故有占除望拜之期也又太嵗乙丑金上中下全尅己亥木之宅仍用客太隂入宅故亦有口舌文書之災須以貴賤言之也曇瑩曰甲午生人三十二上小運丁酉金家旺鄉乙丑太嵗本音正庫又逄驛馬入宅天乙加臨故有占除望拜之喜己亥生三十二小運丁酉在吊客太嵗庚午在死鄉仍為六厄之宫三元受尅故有口舌文書之患自行來出入至夾煞持丘此一節文亦備隂陽地理三元九宫之例用遊年太嵗求其災福非盡三命之理不更備述又以嵗運交宫當須意㑹善惡相伴搖動遷移曇瑩曰如上占除望拜口舌文書禍福交攻吉凶相伴有不用遷變而興故云善惡相伴搖動遷移則吉凶悔吝生乎動者也夾煞持邱親姻哭送曇瑩曰辰戌丑未謂之四大煞亦云三邱之地各以五行入墓假令己巳木命得乙未日生此是本家三邱又以加臨羊創故曰夾煞持邱危疑者甚兼須詳其操執觀其秉持厚薄論其骨狀成器藉於心源曇瑩曰秉持操執觀人所為也骨狀心源定人厚薄也然以五行論命亦須藉於德行由是視其所以觀其所由察其所安人焉廋哉故術云有心無相相逐心生有相無心心隨相滅木氣盛而仁昌庚辛虧而義寡曇瑩曰此以五行配於五常定人之器量也甲乙木主仁丙丁火主禮戊己土主信庚辛金主義壬癸水主智木盛則仁昌金虧則義寡餘皆象事知器占事知來惡耀加而有喜宜其大器曇瑩曰修之於身其德乃真故曰忠孝仁義德之順也雖臨諸煞反為權星福星臨而禍發以表凶人曇瑩曰富貴而驕自貽其咎故曰悖傲無禮德之逆也善不失善報而惡自招殃此珞琭子深戒之也處定求動尅未盡而難遷曇瑩曰君子居則觀其象而玩其辭動則觀其變而玩其占是以自天祐之吉無不利居安問危可凶中而卜吉曇瑩曰且吉凶禍福之興也非聖人孰能知之於未有之前哉若能趨吉而背凶此居安慮危之道也貴而忘賤災自奢生迷而不返禍從惑起曇瑩曰貴必以賤為本髙必以下為基有附勢而叨功因賤而竊祿殊不知禍兮福所倚福兮禍所伏是故鬼神嫉之困於不道殊常易舊變處為萌福善禍淫吉凶異兆曇瑩曰有變動然後吉凶生焉故曰吉凶悔吝生乎動者也又曰吉凶者失得之象也積善之家必有餘慶積不善之家必有餘殃易之戒也至於公明季主尚無變識之文景純仲舒不載比形之妙曇瑩曰管輅公明司馬季主郭景純董仲舒此四賢者探天人之賾原性命之理窮隂陽象數知來物吉凶尚無變識之文不載比形之妙言造物深奧不易度量詳其往聖鑑以前賢或指事以陳謀或約文而切理多或少剩二義難精曇瑩曰凡論五行離道者非也離世法者非也離人物者亦非也或約文而切理或指事以陳謀於中神煞交參吉凶互體是知五行通道致物難窮流布其間豈云小補哉今者參詳得失補綴遺蹤窺為心鑑永掛清臺引例終編千希得一
